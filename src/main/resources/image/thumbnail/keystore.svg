<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="100%" height="100%" viewBox="0 0 64 64" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">
    <!-- Left spine - gold/amber for keystore/security -->
    <path d="M2,11 L37,4 L36,61 L2,55 Z" style="fill:#c8912a;stroke:#c8912a;stroke-width:2px;"/>
    <!-- Right white page area -->
    <path d="M34,9 L61,10 L60,55 L34,54 Z" style="fill:#fafafa;stroke:#c8912a;stroke-width:2px;"/>

    <!-- "Keystore" label on spine, top-to-bottom in white -->
    <text x="19" y="32" text-anchor="middle" dominant-baseline="middle"
          font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="bold"
          fill="#fafafa" transform="rotate(90,19,32)">Keystore</text>

    <!-- Key icon in white area, centered around (48, 32) -->
    <!-- Key bow outer ring -->
    <circle cx="44" cy="28" r="7" style="fill:none;stroke:#c8912a;stroke-width:2.5px;"/>
    <!-- Key bow inner hole -->
    <circle cx="44" cy="28" r="2.5" style="fill:#c8912a;stroke:none;"/>
    <!-- Key shaft -->
    <rect x="50" y="26" width="10" height="4" rx="1" style="fill:#c8912a;stroke:none;"/>
    <!-- Tooth 1 -->
    <rect x="53" y="30" width="2.5" height="4.5" style="fill:#c8912a;stroke:none;"/>
    <!-- Tooth 2 -->
    <rect x="57.5" y="30" width="2.5" height="3.5" style="fill:#c8912a;stroke:none;"/>
</svg>
